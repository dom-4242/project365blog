name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".github/ISSUE_TEMPLATE/**"
      - "LICENSE"

jobs:
  deploy:
    name: Build & Deploy on pilab01
    runs-on: [self-hosted, linux, arm64]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t project365blog:latest .

      - name: Deploy
        run: |
          cd /container/project365blog/app
          docker compose up -d --no-deps web
          docker image prune -f
