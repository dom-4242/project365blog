name: project365blog

# ============================================
# docker-compose.yml — Produktion
#
# Voraussetzungen:
#   cp .env.example .env
#   # .env befüllen (DB_PASSWORD, Fitbit-Keys, etc.)
#
# Starten:
#   docker compose pull && docker compose up -d
#
# Lokale Entwicklung (mit Build + Adminer):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# ============================================

services:
  # --- PostgreSQL ---
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: project365
      POSTGRES_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD muss in .env gesetzt sein}"
      POSTGRES_DB: project365blog
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U project365 -d project365blog"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Kein Port-Mapping: DB nur intern erreichbar

  # --- Next.js App ---
  web:
    image: ${IMAGE:-ghcr.io/dom-4242/project365blog:latest}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - path: .env
        required: false
    environment:
      # DATABASE_URL wird explizit gesetzt damit der DB-Hostname stimmt
      DATABASE_URL: "postgresql://project365:${DB_PASSWORD}@db:5432/project365blog"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - uploads:/app/public/images/journal
      - private_photos:/app/private/body-photos
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s

  # --- Fitbit Cron ---
  fitbit-cron:
    image: alpine:3.19
    restart: unless-stopped
    environment:
      CRON_SECRET: ${CRON_SECRET:-}
    dns:
      - 1.1.1.1
      - 8.8.8.8
    depends_on:
      web:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        apk update -q && apk add --no-cache curl -q
        printf 'CRON_SECRET=%s\n0 4 * * * curl -sf -H "Authorization: Bearer $$CRON_SECRET" http://web:3000/api/cron/fitbit-sync\n' "$$CRON_SECRET" | crontab -
        crond -f -d 6

volumes:
  postgres_data:
  uploads:
  private_photos:
