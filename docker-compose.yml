services:
  # --- PostgreSQL ---
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: project365
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: project365blog
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U project365 -d project365blog"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Next.js App ---
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://project365:${DB_PASSWORD:-changeme}@db:5432/project365blog"
      # Fitbit API (aus .env laden)
      FITBIT_CLIENT_ID: ${FITBIT_CLIENT_ID:-}
      FITBIT_CLIENT_SECRET: ${FITBIT_CLIENT_SECRET:-}
      FITBIT_ACCESS_TOKEN: ${FITBIT_ACCESS_TOKEN:-}
      FITBIT_REFRESH_TOKEN: ${FITBIT_REFRESH_TOKEN:-}
      # Health Auto Export Webhook
      HEALTH_IMPORT_API_KEY: ${HEALTH_IMPORT_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

  # --- Adminer (DB GUI, nur für Entwicklung) ---
  # Auskommentieren für Production
  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data:
