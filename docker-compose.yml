# ============================================
# docker-compose.yml — Produktion
#
# Voraussetzungen:
#   cp .env.example .env
#   # .env befüllen (DB_PASSWORD, Fitbit-Keys, etc.)
#
# Starten:
#   docker compose pull && docker compose up -d
#
# Lokale Entwicklung (mit Build + Adminer):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# ============================================

services:
  # --- PostgreSQL ---
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: project365
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Fehler: DB_PASSWORD muss in .env gesetzt sein}
      POSTGRES_DB: project365blog
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U project365 -d project365blog"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Kein Port-Mapping: DB nur intern erreichbar

  # --- Next.js App ---
  web:
    image: ${IMAGE:-ghcr.io/dominiquestampfli/project365blog:latest}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://project365:${DB_PASSWORD}@db:5432/project365blog"
      FITBIT_CLIENT_ID: ${FITBIT_CLIENT_ID:-}
      FITBIT_CLIENT_SECRET: ${FITBIT_CLIENT_SECRET:-}
      FITBIT_ACCESS_TOKEN: ${FITBIT_ACCESS_TOKEN:-}
      FITBIT_REFRESH_TOKEN: ${FITBIT_REFRESH_TOKEN:-}
      HEALTH_IMPORT_API_KEY: ${HEALTH_IMPORT_API_KEY:-}
      CRON_SECRET: ${CRON_SECRET:-}
    volumes:
      - uploads:/app/public/images/journal
    depends_on:
      db:
        condition: service_healthy

  # --- Fitbit Cron ---
  fitbit-cron:
    image: alpine:3.19
    restart: unless-stopped
    environment:
      CRON_SECRET: ${CRON_SECRET:-}
    depends_on:
      - web
    entrypoint:
      - /bin/sh
      - -c
      - |
        apk add --no-cache curl -q
        printf 'CRON_SECRET=%s\n0 3 * * * curl -sf -H "Authorization: Bearer $$CRON_SECRET" http://web:3000/api/cron/fitbit-sync\n' "$$CRON_SECRET" | crontab -
        crond -f -d 6

volumes:
  postgres_data:
  uploads:
